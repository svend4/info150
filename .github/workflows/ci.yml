name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: triage4 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: triage4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: triage4/pyproject.toml

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install ruff mypy httpx

      - name: ruff check
        run: ruff check triage4 tests

      - name: mypy
        run: mypy --ignore-missing-imports triage4

      - name: pytest
        run: pytest -q

      - name: Full pipeline benchmark (smoke)
        run: python examples/full_pipeline_benchmark.py
