name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: triage4 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: triage4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: triage4/pyproject.toml

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install ruff mypy httpx

      - name: ruff check
        run: ruff check triage4 tests examples

      - name: mypy
        run: mypy --ignore-missing-imports triage4

      - name: claims-lint
        run: python scripts/claims_lint.py

      - name: pytest
        run: pytest -q

      - name: Full pipeline benchmark (text)
        run: python examples/full_pipeline_benchmark.py

      - name: Full pipeline benchmark (JSON smoke)
        run: python examples/full_pipeline_benchmark.py --json benchmark.json

      - name: Phase 9 demo scripts
        run: |
          python examples/quick_triage.py
          python examples/uav_waypoint_demo.py
          python examples/bayesian_twin_demo.py
          python examples/crdt_sync_demo.py
          python examples/counterfactual_replay.py
          python examples/marker_handoff_demo.py

      - name: Level C demos + stress benchmark
        run: |
          python examples/multi_platform_demo.py
          python examples/calibration_walkthrough.py
          python examples/mission_replay_demo.py
          python examples/stress_benchmark.py

      - name: Phase 10 Stage 2 webcam demo (synthetic fallback)
        run: python examples/webcam_triage_demo.py --synthetic --frames 90
