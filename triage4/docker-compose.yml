# triage4 compose — dashboard API + (optional) future web UI
#
# Usage:
#   docker compose up -d
#   curl http://localhost:8000/health
#   docker compose down
#
# Configuration:
#   - TRIAGE4_CONFIG selects one of configs/*.yaml at runtime.
#   - No real platform SDKs are installed — the API runs in loopback
#     mode against the four in-process bridges.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: triage4:0.1.0
    container_name: triage4-api
    restart: unless-stopped
    environment:
      TRIAGE4_CONFIG: /app/configs/production.yaml
      TRIAGE4_LOG_LEVEL: info
    ports:
      - "127.0.0.1:8000:8000"
    # Runtime hardening — aligns with Phase 13 security notes.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Reverse-proxy placeholder. Fill in TLS certs + bearer auth in
  # a real deployment. Disabled by default; enable via:
  #   docker compose --profile edge up -d
  proxy:
    image: nginx:1.27-alpine
    profiles: ["edge"]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
