# triage4 — minimal nginx reverse proxy (example, not production-hardened)
#
# Referenced by docker-compose.yml "proxy" profile:
#   docker compose --profile edge up -d
#
# Fill in:
#   - TLS certificate + key paths;
#   - `Authorization` check;
#   - rate-limit zone if exposing publicly.

worker_processes 1;
events { worker_connections 1024; }

http {
    server_tokens off;

    log_format triage '$remote_addr $request_time "$request" $status';
    access_log /dev/stdout triage;

    upstream triage4_api {
        server api:8000;
    }

    # Rate limit — protect against runaway clients.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    server {
        listen 8443 ssl http2;
        server_name _;

        # TODO: mount your own certs — never ship the default snakeoil.
        # ssl_certificate     /etc/nginx/tls/triage4.crt;
        # ssl_certificate_key /etc/nginx/tls/triage4.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Minimal security headers — tune for your frontend.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        client_max_body_size 1m;

        location /health {
            proxy_pass http://triage4_api;
            proxy_http_version 1.1;
            access_log off;
        }

        location / {
            # TODO: replace with a real auth layer (bearer token / mTLS).
            # if ($http_authorization != "Bearer changeme") { return 401; }

            limit_req zone=api burst=40 nodelay;

            proxy_pass http://triage4_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
    }
}
