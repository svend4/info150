# triage4 — edge / denied-comms deployment config (example, not wired)
#
# Companion-computer profile: one platform, offline-capable, CRDT
# sync when peers are reachable, offline markers when they aren't.

scene:
  casualties: 0
  immediate_ratio: 0.0
  delayed_ratio: 0.0
  minimal_ratio: 0.0

thresholds:
  bleeding_immediate: 0.80
  breathing_weak: 0.05
  perfusion_low: 0.80
  posture_collapse: 0.80

operator:
  require_confirmation_on_immediate: true
  allow_autonomous_waypoint_dispatch: false
  handoff_timeout_s: 30

bridges:
  preferred: "loopback"     # loopback until a real platform is bound
  max_staleness_s: 5.0
  low_battery_warning_pct: 25.0   # stricter — edge power is scarce

denied_comms:
  crdt_enabled: true
  crdt_replica_id_env: "TRIAGE4_REPLICA_ID"
  marker_codec_enabled: true
  marker_max_age_s: 86400      # 24 h
  marker_secret_env: "TRIAGE4_MARKER_SECRET"

security:
  marker_secret_env: "TRIAGE4_MARKER_SECRET"
  dashboard_token_env: "TRIAGE4_DASHBOARD_TOKEN"
  tls_cert_env: "TRIAGE4_TLS_CERT_PATH"

telemetry:
  log_level: "warning"
  structured_json: true
  retention_days: 3
